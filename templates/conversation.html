<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charlie - Chat with me!</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'css/conversation.css' %}" />
    <link
      rel="icon"
      type="image/png"
      href="{% static 'images/favicon.ico' %}"
    />
  </head>
  <body>
    {% csrf_token %}
    <nav class="navbar">
      <h1 class="header">Charlie &mdash; Your Digital Buddy in Surigao</h1>
    </nav>

    <div class="messages-container" id="messagesContainer">
      <div class="empty-state" id="emptyState">
        <div class="image-wrapper">
          <img
            src="{% static 'images/no-messages-yet.png' %}"
            alt="No messages yet"
            class="empty-state-image"
          />
        </div>
        <p class="empty-state-text">
          No messages yet! Start chatting with Charlie to begin your
          conversation.
        </p>
      </div>
    </div>

    <div class="input-container">
      <button class="share-button" id="shareButton" title="Share conversation">
        <img src="{% static 'images/share.png' %}" class="share-icon" alt="">
        Share
      </button>
      <button class="delete-button" id="deleteButton">Delete Chat</button>
      <textarea
        class="chat-input"
        id="chatInput"
        placeholder="Type your message here..."
        rows="1"
      ></textarea>
      <div class="action-buttons">
        <button class="send-button" id="sendButton">&#10148;</button>
        <button class="print-button" id="printButton" title="Print conversation">
          <img src="{% static 'images/printer.png' %}" width="18" height="18" alt="Print">
        </button>
      </div>
    </div>

    <button class="scroll-top-btn" id="scrollTopBtn">&#8593;</button>

    <!-- Share Modal -->
    <div class="share-modal-overlay hidden" id="shareModalOverlay">
      <div class="share-modal" role="dialog" aria-modal="true" aria-labelledby="shareModalTitle">
        <div class="share-modal-header">
          <span class="share-modal-title" id="shareModalTitle">Share Conversation</span>
          <button class="share-modal-close" id="shareModalClose" aria-label="Close">&times;</button>
        </div>
        <p class="share-modal-desc">
          Anyone with this link can view the full conversation between you and Charlie.
        </p>
        <div class="share-link-row">
          <input type="text" class="share-link-input" id="shareLinkInput" readonly />
          <button class="share-copy-btn" id="shareCopyBtn">Copy</button>
        </div>
        <hr class="share-modal-divider" />
        <div class="share-platforms">
          <button class="share-platform-btn" id="shareViaFacebook">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.413c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.513c-1.491 0-1.956.93-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
            Facebook
          </button>
          <button class="share-platform-btn" id="shareViaX">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="#000"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.265 5.638 5.9-5.638zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            X (Twitter)
          </button>
          <button class="share-platform-btn" id="shareViaMessenger">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#0084FF"><path d="M12 0C5.373 0 0 4.975 0 11.111c0 3.497 1.745 6.616 4.472 8.652V24l4.086-2.242c1.09.301 2.246.464 3.442.464 6.627 0 12-4.975 12-11.111S18.627 0 12 0zm1.191 14.963l-3.055-3.26-5.963 3.26L10.732 8l3.131 3.259L19.752 8l-6.561 6.963z"/></svg>
            Messenger
          </button>
          <button class="share-platform-btn" id="shareViaInstagram">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="url(#igGrad)">
              <defs>
                <linearGradient id="igGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                  <stop offset="0%" style="stop-color:#f09433"/>
                  <stop offset="25%" style="stop-color:#e6683c"/>
                  <stop offset="50%" style="stop-color:#dc2743"/>
                  <stop offset="75%" style="stop-color:#cc2366"/>
                  <stop offset="100%" style="stop-color:#bc1888"/>
                </linearGradient>
              </defs>
              <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
            </svg>
            Instagram
          </button>
        </div>
      </div>
    </div>

    <script src="{% static 'js/typing_animation.js' %}"></script>
    <script src="{% static 'js/conversation.js' %}"></script>
    <script src="{% static 'js/chat_handler.js' %}"></script>
    <script src="{% static 'js/fun_facts_bubble.js' %}"></script>
  </body>
</html>
